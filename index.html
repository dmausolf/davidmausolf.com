  <style>
    :root {
      --bg: #F6F5F3;
      --text: #111110;
      --text-mid: #4A4944;
      --text-quiet: #7A7972;
      --rule: #D4D2CD;
      --rule-heavy: #111110;
      --rust: #8C3A1F;
      --serif: 'Source Serif 4', 'Georgia', serif;
      --mono: 'IBM Plex Mono', 'Menlo', monospace;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html {
      font-size: 17px;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--serif);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .page {
      max-width: 740px;
      margin: 0 auto;
      padding: 0 2rem;
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .void { height: 10rem; }

    header {
      padding-bottom: 0.8rem;
      margin-bottom: 4rem;
      border-bottom: 2px solid var(--rule-heavy);
    }

    .name {
      font-family: var(--mono);
      font-weight: 400;
      font-size: 0.7rem;
      letter-spacing: 0.03em;
      color: var(--text);
    }

    main { flex: 1; }

    .section-label {
      font-family: var(--mono);
      font-weight: 500;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--text-quiet);
      padding-bottom: 0.8rem;
    }

    /* ── ESSAY CARD ── */

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      border-top: 2px solid var(--rule-heavy);
      border-bottom: 1px solid var(--rule);
      padding: 1.8rem 0;
    }

    .card:hover .card-thumb {
      transform: scale(1.008);
    }

    .card:hover .card-title {
      color: var(--rust);
    }

    .card-thumb {
      background: #0A0A09;
      border-radius: 2px;
      padding: 1.6rem 1.8rem 1.2rem;
      margin-bottom: 1.4rem;
      margin-left: -2rem;
      margin-right: -2rem;
      transition: transform 0.3s ease;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(20, 1fr);
      gap: 3px;
      max-width: 540px;
      margin: 0 auto 0.8rem;
    }

    .mini-dot {
      aspect-ratio: 1;
      border-radius: 50%;
      background: #1E1D1B;
    }

    .mini-dot.lit {
      background: var(--rust);
      box-shadow: 0 0 4px rgba(140, 58, 31, 0.35);
    }

    .mini-caption {
      text-align: center;
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 0.75rem;
      color: #555;
      letter-spacing: 0.01em;
    }

    .mini-caption em {
      font-style: normal;
      color: var(--rust);
    }

    .card-label {
      font-family: var(--mono);
      font-weight: 400;
      font-size: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--rust);
      margin-bottom: 0.5rem;
    }

    .card-title {
      font-family: var(--serif);
      font-weight: 600;
      font-size: 1.5rem;
      line-height: 1.2;
      letter-spacing: -0.01em;
      color: var(--text);
      transition: color 0.2s;
    }

    .card-meta {
      font-family: var(--mono);
      font-weight: 300;
      font-size: 0.55rem;
      color: var(--text-quiet);
      margin-top: 0.4rem;
      letter-spacing: 0.02em;
    }

    .card-desc {
      font-family: var(--serif);
      font-weight: 300;
      font-style: italic;
      font-size: 0.88rem;
      color: var(--text-mid);
      margin-top: 0.35rem;
      line-height: 1.45;
    }

    footer {
      padding: 1rem 0 4rem;
      border-top: 2px solid var(--rule-heavy);
      margin-top: 5rem;
    }

    footer a {
      font-family: var(--mono);
      font-weight: 300;
      font-size: 0.62rem;
      color: var(--text-quiet);
      text-decoration: none;
      transition: color 0.2s;
    }

    footer a:hover { color: var(--text-mid); }

    @media (max-width: 600px) {
      html { font-size: 15.5px; }
      .page { padding: 0 1.4rem; }
      .void { height: 6rem; }
      header { margin-bottom: 3rem; }
      .card-title { font-size: 1.15rem; }
      .card-thumb {
        margin-left: -1.4rem;
        margin-right: -1.4rem;
        padding: 1.2rem 1.4rem 1rem;
      }
      .mini-grid { gap: 1.5px; max-width: 100%; }
      .mini-caption { font-size: 0.68rem; }
    }
  </style>
